<!DOCTYPE html>
<html lang='zh-CN'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>日课一问 | 每日三省，破局人生</title>
    <link rel='icon' href='icon.png' type='image/png'>
    <link rel='stylesheet' href='style.css'>
</head>
<body>
    <div class='card' id='daily-card'>
        <div class='card-header'>
            <div class='header-brand'>
                <a href='https://github.com/cnfeat/DailyQuestion#readme' target='_blank' class='brand-link'>日课一问 | 每日三省，破局人生</a>
            </div>
            <div class='header-meta'>
                <div class='card-id' id='card-id'>NO.000</div>
            </div>
        </div>
        
        <div class='card-content'>
            <!-- 正常状态 -->
            <div id='normal-state'>
                <div class='question-area'>
                    <h1 id='question-display'>正在抽取今日问题...</h1>
                </div>
                <div class='divider'></div>
                <div class='extension-area'>
                    <p id='extension-display'>思考加载中...</p>
                </div>
                <div id='change-btn'></div>
            </div>
            
            <!-- 错误降级 -->
            <div id='error-state' class='error-state'>
                <div class='error-icon'>🍃</div>
                <p class='error-msg'>题目加载失败<br>请刷新页面重试</p>
                <button class='retry-btn' onclick='location.reload()'>重新加载</button>
            </div>
            
            <div class='progress-container'>
                <div id='gregorian-date' class='card-date-bottom'></div>
                <div id='progress-text' class='progress-text'></div>
                <div id='progress-grid' class='progress-grid'></div>
            </div>
        </div>
        
        <div class='card-footer'>
            <div class='footer-left'>
                <a href='https://github.com/cnfeat/DailyQuestion#readme' target='_blank' class='footer-share-link'>📋 获取完整 420 题 A6 卡片 PDF →</a>
            </div>
            
            <div class='footer-right'>
                <div class='footer-info'>
                    <a href='https://www.cnfeat.com/' target='_blank' class='footer-note'>出品：卡片创作实验室</a>
                </div>
                
                <button id='download-btn' class='action-btn' title='下载这张问题'>
                    <svg viewBox='0 0 24 24' width='16' height='16' stroke='currentColor' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'>
                        <path d='M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4'></path>
                        <polyline points='7 10 12 15 17 10'></polyline>
                        <line x1='12' y1='15' x2='12' y2='3'></line>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <script src='data.js'></script>
    <script src='script.js'></script>
</body>
</html>
