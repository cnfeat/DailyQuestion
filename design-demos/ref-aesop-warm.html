<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日课一问 | 每日三省，破局人生</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════
           日课一问 · Aesop Warm 视觉方案
           气质：温暖克制 / 东方留白 / 纸质纹理
           ═══════════════════════════════════════ */

        :root {
            /* 纸质感色彩系统 */
            --paper-bg: #f3efe8;
            --paper-card: #faf8f5;
            --paper-texture: rgba(139, 119, 91, 0.018);
            --ink-primary: #2c2a26;
            --ink-secondary: #5c5852;
            --ink-muted: #9a958d;
            --ink-faint: #c4bfb7;
            --ink-ghost: #ddd8d0;

            /* 品牌色：从豆瓣绿提取，降低饱和度融入暖调 */
            --brand: #5a8a6e;
            --brand-soft: rgba(90, 138, 110, 0.12);
            --brand-muted: rgba(90, 138, 110, 0.55);

            /* 年度进度色阶 */
            --progress-filled: #6b9b82;
            --progress-filled-soft: #8ab39e;
            --progress-empty: #e8e4dc;
            --progress-empty-border: #ddd8cf;

            /* 排版尺度 */
            --font-serif: 'Newsreader', 'Noto Serif SC', 'Songti SC', 'STSong', serif;
            --font-sans: 'Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--paper-bg);
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            align-items: center;
            /* 微妙的纸质噪点纹理 */
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(180, 160, 130, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(160, 140, 120, 0.03) 0%, transparent 50%);
        }

        /* ═══ 卡片容器 ═══ */
        .card {
            background-color: var(--paper-card);
            aspect-ratio: 3 / 4;
            width: 100%;
            max-width: min(92vw, calc(92vh * 0.75), 720px);
            padding: clamp(40px, 10cqi, 88px);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;

            /* 纸质卡片质感 */
            box-shadow:
                0 1px 3px rgba(60, 50, 30, 0.04),
                0 4px 16px rgba(60, 50, 30, 0.03),
                0 12px 40px rgba(60, 50, 30, 0.04);

            /* 极淡的暖色边框，像纸张边缘 */
            border: 1px solid rgba(160, 140, 120, 0.08);

            /* 无圆角 —— 像一张真实的纸 */
            border-radius: 0;

            container-type: inline-size;
        }

        /* 纸质纹理层 —— CSS 模拟 */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.4;
            background-image:
                /* 纤维纹理 */
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 119, 91, 0.008) 2px,
                    rgba(139, 119, 91, 0.008) 3px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 3px,
                    rgba(139, 119, 91, 0.005) 3px,
                    rgba(139, 119, 91, 0.005) 4px
                );
        }

        /* 顶部淡色装饰线 —— 像信笺 */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                var(--brand-muted) 15%,
                var(--brand) 50%,
                var(--brand-muted) 85%,
                transparent 100%
            );
            opacity: 0.35;
        }

        /* ═══ 头部 ═══ */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-shrink: 0;
            margin-bottom: clamp(32px, 7cqi, 56px);
            position: relative;
            z-index: 1;
        }

        .header-brand {
            font-family: var(--font-sans);
            font-size: clamp(9px, 1.8cqi, 11px);
            font-weight: 400;
            color: var(--ink-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-brand .brand-name {
            color: var(--ink-secondary);
            font-weight: 500;
            letter-spacing: 3px;
        }

        .header-brand .brand-divider {
            margin: 0 8px;
            color: var(--ink-ghost);
        }

        .header-brand .brand-tagline {
            font-weight: 300;
            letter-spacing: 1.5px;
        }

        .card-id {
            font-family: var(--font-sans);
            font-size: clamp(9px, 1.8cqi, 11px);
            font-weight: 400;
            color: var(--ink-faint);
            letter-spacing: 2px;
        }

        /* ═══ 内容区 ═══ */
        .card-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* ── 问题区 ── */
        .question-area {
            margin-bottom: clamp(24px, 5cqi, 40px);
        }

        .question-text {
            font-family: var(--font-serif);
            font-size: clamp(24px, 6.5cqi, 38px);
            font-weight: 400;
            line-height: 1.55;
            color: var(--ink-primary);
            letter-spacing: 0.8px;
            text-wrap: balance;
        }

        /* 首字下沉效果 */
        .question-text::first-letter {
            font-size: 1.15em;
            font-weight: 500;
        }

        /* ── 分割线 ── */
        .divider {
            width: 40px;
            height: 1px;
            background-color: var(--brand);
            opacity: 0.5;
            margin-bottom: clamp(24px, 5cqi, 40px);
            flex-shrink: 0;
        }

        /* ── 延伸反思区 ── */
        .extension-area {
            margin-bottom: clamp(28px, 6cqi, 48px);
        }

        .extension-text {
            font-family: var(--font-sans);
            font-size: clamp(13px, 3.2cqi, 15px);
            font-weight: 300;
            line-height: 2;
            color: var(--ink-secondary);
            letter-spacing: 0.4px;
            text-wrap: pretty;
        }

        /* ── 换题按钮 ── */
        .change-btn-area {
            margin-bottom: clamp(32px, 7cqi, 52px);
            text-align: left;
        }

        .change-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-sans);
            font-size: clamp(11px, 2.4cqi, 13px);
            font-weight: 400;
            color: var(--ink-muted);
            letter-spacing: 0.6px;
            cursor: pointer;
            padding: 8px 0;
            transition: color 0.3s ease;
            user-select: none;
            background: none;
            border: none;
        }

        .change-btn:hover {
            color: var(--brand);
        }

        .change-btn .btn-arrow {
            font-size: 0.85em;
            transition: transform 0.3s ease;
        }

        .change-btn:hover .btn-arrow {
            transform: translateX(3px);
        }

        .change-btn .btn-meta {
            color: var(--ink-faint);
            font-weight: 300;
            font-size: 0.9em;
        }

        /* ═══ 年度进度 ═══ */
        .progress-section {
            margin-top: auto;
            padding-top: clamp(20px, 4cqi, 32px);
            border-top: 1px solid var(--progress-empty);
            flex-shrink: 0;
        }

        .progress-date {
            font-family: var(--font-sans);
            font-size: clamp(10px, 2cqi, 12px);
            font-weight: 400;
            color: var(--ink-muted);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .progress-text {
            font-family: var(--font-sans);
            font-size: clamp(10px, 2cqi, 12px);
            font-weight: 300;
            color: var(--ink-faint);
            letter-spacing: 0.4px;
            margin-bottom: 14px;
        }

        /* 365格方块矩阵 */
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(26, 1fr);
            gap: 2px;
            width: 100%;
        }

        .progress-cell {
            width: 100%;
            aspect-ratio: 1;
            background-color: var(--progress-empty);
            border: 1px solid var(--progress-empty-border);
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .progress-cell.filled {
            background-color: var(--progress-filled);
            border-color: var(--progress-filled);
        }

        .progress-cell.filled.recent {
            background-color: var(--progress-filled-soft);
            border-color: var(--progress-filled-soft);
        }

        /* ═══ 底部栏 ═══ */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: clamp(16px, 3cqi, 24px);
            margin-top: clamp(16px, 3cqi, 24px);
            border-top: 1px solid var(--progress-empty);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .footer-left .footer-link {
            font-family: var(--font-sans);
            font-size: clamp(11px, 2.4cqi, 13px);
            font-weight: 400;
            color: var(--ink-muted);
            text-decoration: none;
            letter-spacing: 0.4px;
            transition: color 0.3s ease;
        }

        .footer-left .footer-link:hover {
            color: var(--brand);
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .footer-note {
            font-family: var(--font-sans);
            font-size: clamp(11px, 2.4cqi, 13px);
            font-weight: 300;
            color: var(--ink-faint);
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
        }

        .footer-note:hover {
            color: var(--ink-muted);
        }

        /* 下载按钮 */
        .download-btn {
            background: none;
            border: none;
            color: var(--ink-faint);
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s ease, transform 0.2s ease;
            line-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .download-btn:hover {
            color: var(--brand);
            transform: translateY(-1px);
        }

        .download-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ═══ 响应式微调 ═══ */
        @media (max-width: 480px) {
            .card {
                padding: clamp(28px, 8cqi, 40px);
                max-width: 96vw;
            }

            .progress-grid {
                grid-template-columns: repeat(20, 1fr);
                gap: 1.5px;
            }

            .question-text {
                line-height: 1.5;
            }
        }

        /* 小屏减少方块列数 */
        @media (max-width: 360px) {
            .progress-grid {
                grid-template-columns: repeat(18, 1fr);
            }
        }

        /* ═══ 动画：卡片入场 ═══ */
        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: cardEnter 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 头部 -->
        <div class="card-header">
            <div class="header-brand">
                <span class="brand-name">日课一问</span>
                <span class="brand-divider">|</span>
                <span class="brand-tagline">每日三省，破局人生</span>
            </div>
            <div class="card-id">NO.001</div>
        </div>

        <!-- 内容区 -->
        <div class="card-content">
            <!-- 问题区 -->
            <div class="question-area">
                <h1 class="question-text">你的注意力，今天被谁偷走得最多？</h1>
            </div>

            <!-- 分割线 -->
            <div class="divider"></div>

            <!-- 延伸反思 -->
            <div class="extension-area">
                <p class="extension-text">
                    你回想一下今天，走神的次数比专注的次数多还是少？如果明天你只能在「深度专注一小时」和「碎片浏览一整天」里二选一，你会怎么选？
                </p>
            </div>

            <!-- 换题按钮 -->
            <div class="change-btn-area">
                <button class="change-btn">
                    <span>换一题</span>
                    <span class="btn-arrow">→</span>
                    <span class="btn-meta">(1/3，今日还能抽 2 题)</span>
                </button>
            </div>

            <!-- 年度进度 -->
            <div class="progress-section">
                <div class="progress-date">2026年6月17日 星期二</div>
                <div class="progress-text">今天是 2026 年的第 168 天，进度 46.0%</div>
                <div class="progress-grid" id="progress-grid"></div>
            </div>
        </div>

        <!-- 底部栏 -->
        <div class="card-footer">
            <div class="footer-left">
                <a href="#" class="footer-link">获取完整 420 题 A6 卡片 PDF →</a>
            </div>

            <div class="footer-right">
                <a href="#" class="footer-note">出品：卡片创作实验室</a>
                <button class="download-btn" title="下载这张卡片">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 生成365格年度进度方块
        (function() {
            const grid = document.getElementById('progress-grid');
            const totalDays = 365;
            const currentDay = 168; // 2026年第168天

            for (let i = 1; i <= totalDays; i++) {
                const cell = document.createElement('div');
                cell.className = 'progress-cell';

                if (i <= currentDay) {
                    cell.classList.add('filled');
                    // 最近几天用更淡的色阶
                    if (i > currentDay - 7) {
                        cell.classList.add('recent');
                    }
                }

                grid.appendChild(cell);
            }
        })();
    </script>
</body>
</html>
